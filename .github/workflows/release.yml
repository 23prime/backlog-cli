name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Package binary
        run: tar czf bl-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release bl

      - name: Generate checksum
        run: sha256sum bl-x86_64-unknown-linux-gnu.tar.gz > bl-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bl-x86_64-unknown-linux-gnu.tar.gz
            bl-x86_64-unknown-linux-gnu.tar.gz.sha256
          generate_release_notes: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force
